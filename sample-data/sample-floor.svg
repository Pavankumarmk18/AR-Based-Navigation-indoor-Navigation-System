<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <rect width="900" height="600" fill="#ffffff"/>
  <rect x="20" y="20" width="860" height="560" fill="none" stroke="#1B2130" stroke-width="4"/>

  <!-- corridor -->
  <rect x="20" y="270" width="860" height="60" fill="#EFEFE7" stroke="#C9CDD6" stroke-width="1"/>

  <!-- rooms row 1 -->
  <g fill="#F6F4EE" stroke="#1B2130" stroke-width="2">
    <rect x="20" y="20" width="200" height="250"/>
    <rect x="240" y="20" width="200" height="250"/>
    <rect x="460" y="20" width="200" height="250"/>
    <rect x="680" y="20" width="200" height="250"/>
  </g>
  <!-- rooms row 2 -->
  <g fill="#F6F4EE" stroke="#1B2130" stroke-width="2">
    <rect x="20" y="330" width="200" height="250"/>
    <rect x="240" y="330" width="200" height="250"/>
    <rect x="460" y="330" width="200" height="250"/>
    <rect x="680" y="330" width="200" height="250"/>
  </g>

  <g font-family="Arial" font-size="20" fill="#4A5163">
    <text x="60" y="150">Room 101</text>
    <text x="280" y="150">Room 102</text>
    <text x="500" y="150">Lab 103</text>
    <text x="740" y="150">Stairs</text>

    <text x="60" y="460">Room 201</text>
    <text x="280" y="460">Faculty</text>
    <text x="500" y="460">Library</text>
    <text x="740" y="460">Entrance</text>
  </g>

  <text x="450" y="305" font-family="Arial" font-size="16" fill="#8A93A6" text-anchor="middle">CORRIDOR</text>

  <!-- north arrow (for reference only, not the calibration itself) -->
  <g transform="translate(850,60)">
    <polygon points="0,-20 8,10 0,3 -8,10" fill="#1B2130"/>
    <text x="0" y="30" font-family="Arial" font-size="12" text-anchor="middle" fill="#1B2130">N</text>
  </g>
</svg>
